<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Remax Arena | Presentación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Layout */
    --row-gap: clamp(20px, 4vw, 60px);
    --pad-x: clamp(20px, 6vw, 120px);

    /* Col 1: logo cuadrado */
    --logo-side: clamp(180px, 18vw, 240px);

    /* Col 3: avatar circular (video) */
    --video-size: clamp(180px, 18vw, 260px);

    /* ====== Video (MISMO BLOQUE QUE TU ORIGINAL) ====== */
    --size: var(--video-size);
    /* encuadre horizontal/vertical del video */
    --zoom: 1.4;  /* zoom del video */
    --tx: -30%;
    --ty:  0%;

    /* Colors */
    --accent: #0b5cff;
    --text-main: #0e1417;
    --text-muted: #57606a;
    --bg-card: #ffffff;
    --shadow-soft: 0 12px 30px rgba(0,0,0,0.08);
    --shadow-deep: 0 20px 50px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100vh; }
  body {
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background: #fcfcfc;
    line-height: 1.5;
  }

  /* Header Pint */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .topbar .inner {
    width: 100%;
    padding: 14px var(--pad-x);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pint-logo { height: 50px; width: auto; } /* Adjusted height for cleaner look */
  .burger { width: 32px; height: 24px; display: grid; gap: 6px; background: transparent; border: 0; cursor: pointer; }
  .burger span { height: 2px; background: #111; border-radius: 2px; transition: 0.3s; }

  /* ====== Fila principal a TODO ANCHO ====== */
  .row {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    padding: 80px var(--pad-x);
    display: grid;
    grid-template-columns: 
      var(--logo-side) 
      minmax(200px, 1fr) 
      var(--video-size) 
      minmax(200px, 1.2fr);
    align-items: center;
    column-gap: var(--row-gap);
    row-gap: 40px;
  }

  /* Columna 1: tarjeta con logo cuadrado */
  .logo-card {
    background: var(--bg-card);
    border: 1px solid rgba(0,0,0,.05);
    border-radius: 24px;
    box-shadow: var(--shadow-deep);
    padding: 24px;
    transition: transform 0.3s ease;
  }
  .logo-card:hover { transform: translateY(-5px); }
  
  .logo-square {
    width: 100%;
    aspect-ratio: 1/1;
    border-radius: 16px;
    overflow: hidden;
    background: #f8f9fa;
    display: grid;
    place-items: center;
  }
  .logo-square img { width: 85%; height: 85%; object-fit: contain; }

  /* Columna 2 y 4: texto y redes */
  .org {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .org h2 {
    margin: 0 0 12px;
    font-size: clamp(1.5rem, 2.5vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap; /* Prevent name wrapping */
    color: #000;
  }
  .kv {
    margin: 4px 0;
    font-size: 0.95rem;
    color: var(--text-muted);
    white-space: nowrap; /* Prevent address/phone wrapping */
  }
  .kv strong { color: var(--text-main); font-weight: 600; }

  /* ===== Redes mejoradas ===== */
  .icons { display: flex; gap: 12px; margin-top: 20px; }

  .icon-btn {
    --fg: #111;
    --ring: rgba(0,0,0,.1);
    --bg: #fff;

    position: relative;
    width: 46px;
    height: 46px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid rgba(0,0,0,.06);
    box-shadow: 0 4px 12px rgba(0,0,0,.05);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .icon-btn svg { width: 20px; height: 20px; }

  .icon-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    border-color: var(--fg);
  }
  
  /* Tooltips */
  .icon-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translate(-50%, 5px);
    background: #111; color: #fff; font-size: 11px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
    opacity: 0; pointer-events: none; white-space: nowrap;
    transition: all 0.2s ease;
  }
  .icon-btn:hover::after { opacity: 1; transform: translate(-50%, 0); }

  /* Colores por marca */
  .icon-btn[data-net="mail"] { --fg: #0b5cff; }
  .icon-btn[data-net="ig"]   { --fg: #e4405f; }
  .icon-btn[data-net="wa"]   { --fg: #25d366; }

  /* Columna 3: avatar circular */
  .media {
    position: relative;
    width: var(--size);
    height: var(--size);
    border-radius: 50%;
    overflow: hidden;
    box-shadow: var(--shadow-deep);
    cursor: pointer;
    background: #eee;
    transition: transform 0.3s ease;
  }
  .media:hover { transform: scale(1.02); }

  .media img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: opacity .3s ease;
    z-index: 1;
  }
  .video-wrap { position: absolute; inset: 0; opacity: 0; transition: opacity .3s ease; z-index: 2; }
  .media.playing .video-wrap { opacity: 1; }
  
  .video-inner {
    position: absolute; inset: 0;
    width: calc(177.78% * var(--zoom));
    height: calc(100% * var(--zoom));
    transform: translate(var(--tx), var(--ty));
  }
  .video-inner iframe { width: 100%; height: 100%; border:0; pointer-events: none; }

  .sound {
    position: absolute;
    left: 50%; bottom: 20px;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 8px 14px; border-radius: 100px;
    opacity: 0; transition: 0.2s; z-index: 3;
  }
  .media.playing .sound { opacity: 1; }

  /* Responsive Layout */
  @media (max-width: 1100px) {
    .row {
      grid-template-columns: 1fr 1fr;
      justify-items: center;
      text-align: center;
    }
    .org { align-items: center; }
    .org h2, .kv { white-space: normal; } /* Allow wrapping on mobile for fit */
  }

  @media (max-width: 600px) {
    .row {
      grid-template-columns: 1fr;
      padding: 40px 20px;
      --logo-side: 200px;
      --video-size: 200px;
    }
  }
</style>
</head>
<body>

<script>
  /* ====== JS ORIGINAL (hover = play en silencio; click = toggle sonido) ====== */
  (function () {
    const media = document.getElementById('media');
    const frame = document.getElementById('ytFrame');
    const badge = document.getElementById('soundBadge');

    const VIDEO_ID = '-lcCvM84bL8';

    const BASE_EMBED =
      `https://www.youtube-nocookie.com/embed/${VIDEO_ID}` +
      `?enablejsapi=1&controls=0&rel=0&modestbranding=1&playsinline=1&mute=1` +
      `&fs=0&iv_load_policy=3&disablekb=1&origin=${encodeURIComponent(location.origin)}` +
      `&loop=1&playlist=${VIDEO_ID}`;

    let loaded=false, apiReady=false, muted=true;

    const ensureLoaded=()=>{ if(loaded) return; frame.src=BASE_EMBED; loaded=true; };
    const post=(func,args=[])=>{
      if(!loaded) return;
      frame.contentWindow?.postMessage(JSON.stringify({event:'command', func, args}), '*');
    };
    const updateBadge=()=>{ badge.textContent = muted ? '🔇 Silencio' : '🔊 Sonido'; };

    frame.addEventListener('load', ()=>{
      apiReady=true; post('mute'); post('playVideo'); updateBadge();
    });

    const playMuted=()=>{
      ensureLoaded();
      media.classList.add('playing');
      if(apiReady){ muted=true; post('mute'); post('playVideo'); updateBadge(); }
    };
    const pause=()=>{
      if(apiReady) post('pauseVideo');
      media.classList.remove('playing');
    };

    media.addEventListener('mouseenter', playMuted);
    media.addEventListener('mouseleave', pause);

    media.addEventListener('click', ()=>{
      ensureLoaded();
      media.classList.add('playing');
      if(!apiReady) return;
      post('playVideo');
      muted = !muted;
      if(muted) post('mute'); else post('unMute');
      updateBadge();
    }, { passive:true });

    window.addEventListener('pagehide', pause);
    document.addEventListener('visibilitychange', ()=>{ if(document.hidden) pause(); });
  })();
</script>
</body>
</html>
